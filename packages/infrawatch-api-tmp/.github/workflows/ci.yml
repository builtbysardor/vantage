name: InfraWatch CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/infrawatch-backend

jobs:
  # ── Lint & Test ──────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pytest httpx

      - name: Lint with ruff
        run: ruff check backend/ --ignore E501

      - name: Smoke test — import check
        run: |
          cd backend
          python -c "
          import sys, os
          os.environ['DATABASE_URL'] = 'sqlite:///test.db'
          os.environ['DB_ENABLED'] = 'false'
          from main import app
          print('Import OK — FastAPI app loaded')
          "

  # ── Build Docker Image ───────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stack Health Check ───────────────────────────────────────
  integration:
    name: Stack Integration Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Start core stack (no Celery/DB for CI speed)
        run: |
          docker compose up -d prometheus node_exporter backend \
            --wait --wait-timeout 90 \
            || docker-compose up -d prometheus node_exporter backend

      - name: Wait for backend
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/health && break
            echo "Waiting... ($i)"
            sleep 5
          done

      - name: Test REST endpoints
        run: |
          curl -sf http://localhost:8000/health
          curl -sf http://localhost:8000/api/status
          curl -sf http://localhost:8000/api/metrics
          echo "All endpoints OK"

      - name: Test auth endpoint
        run: |
          TOKEN=$(curl -sf -X POST http://localhost:8000/auth/token \
            -d "username=admin&password=infrawatch" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "Token obtained: ${TOKEN:0:20}..."

      - name: Tear down
        if: always()
        run: docker compose down -v || docker-compose down -v
