version: "3.9"

include:
  - infra/docker-compose.infra.yml

services:
  nexus-api:
    build:
      context: ./packages/nexus-api/backend
      dockerfile: Dockerfile
    container_name: vantage_nexus
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=${VANTAGE_JWT_SECRET}
      - CORS_ORIGINS=${VANTAGE_FRONTEND_URL:-http://localhost:3000}
      - API_KEYS=${API_KEYS}
      - AGENT_TOKENS=${AGENT_TOKENS}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: vantage_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_NEXUS_URL=http://localhost:3001
      - NEXT_PUBLIC_API_INFRAWATCH_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_NEXUS_URL=ws://localhost:3001
      - NEXT_PUBLIC_WS_INFRAWATCH_URL=ws://localhost:8000
    depends_on:
      - nexus-api
      - backend
    networks:
      - monitoring

networks:
  monitoring:
    external: true
