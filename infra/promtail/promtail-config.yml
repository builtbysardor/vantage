# =============================================================
# Promtail Configuration — promtail/promtail-config.yml
#
# Tails system logs and Docker container logs, then ships
# them to Loki for storage and querying in Grafana.
# =============================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ----------------------------------------------------------
  # Job 1: Host system logs (/var/log)
  # ----------------------------------------------------------
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          host: infrawatch-host
          __path__: /var/log/*.log

  # ----------------------------------------------------------
  # Job 2: Docker container JSON logs
  # Parses Docker's {"log":"...","stream":"...","time":"..."} format.
  # ----------------------------------------------------------
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          host: infrawatch-host
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
      - labels:
          stream:
      - output:
          source: output
