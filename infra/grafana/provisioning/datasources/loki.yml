# =============================================================
# Grafana Data Source Provisioning — Loki
# grafana/provisioning/datasources/loki.yml
#
# Grafana reads this on startup and auto-registers Loki as a
# data source. No manual UI clicks needed.
# =============================================================

apiVersion: 1

deleteDatasources:
  - name: Loki
    orgId: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
